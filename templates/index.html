<!DOCTYPE html>
<html>
<head>

    <title>Flight Fare Predictor</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Intelligent Flight Recommendation System
    </h1>

    <form action="/predict" method="POST" class="card p-4 shadow">

        <!-- Source -->
        <div class="mb-3">

            <label>Source</label>

            <select
                name="source"
                id="source"
                class="form-control"
                onchange="updateDestinations()"
            >

                {% for source in sources %}

                <option value="{{ source }}">
                    {{ source }}
                </option>

                {% endfor %}

            </select>

        </div>

        <!-- Destination -->
        <div class="mb-3">

            <label>Destination</label>

            <select
                name="destination"
                id="destination"
                class="form-control"
            >
            </select>

        </div>

        <!-- Date -->
        <div class="mb-3">

            <label>Departure Date</label>

            <input
                type="date"
                name="departure_date"
                class="form-control"
                required
            >

        </div>

        <button type="submit" class="btn btn-primary w-100">
            Search Flights
        </button>

    </form>

</div>

<script>

    const routeMap = {{ route_map | safe }};

    function updateDestinations() {

        const source = document.getElementById("source").value;

        const destinationSelect =
            document.getElementById("destination");

        destinationSelect.innerHTML = "";

        routeMap[source].forEach(destination => {

            const option = document.createElement("option");

            option.value = destination;
            option.text = destination;

            destinationSelect.appendChild(option);
        });
    }

    // Load initial destinations
    updateDestinations();

</script>

</body>
</html>
